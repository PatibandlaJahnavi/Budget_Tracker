{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5">
            <div class="card-body">

                <h3 class="text-center mb-4">Register</h3>

                <form method="POST">
                    {% csrf_token %}

                    <!-- Full Name -->
                    <div class="mb-3">
                        <label for="username">Username</label>
                        <input type="text" id="username"
                               name="username" class="form-control"
                               placeholder="Enter username" required>
                    </div>
                <!-- Email -->
                <div class="mb-3">
                    <label for="email">
                        Email
                    </label>
                    <input type="email" id="email" name="email"
                           class="form-control" placeholder="Enter email" required>
                </div>


                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password1">Password</label>
                        <div class="input-group">
                            <input type="password" id="password1"
                                   name="password1" class="form-control"
                                   placeholder="Ënter password" required>
                            <button class="btn btn-outline-secondary"
                                    type="button"
                                    id="togglePassword1"
                                    aria-label="Show or hide password">👁
                            </button>
                        </div>

                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-3">
                        <label for="password2">Confirm Password</label>
                        <div class="input-group">
                            <input type="password" id="password2" name="password2"
                                   class="form-control" placeholder="Confirm password"
                                   required>
                            <button class="btn btn-outline-secondary" type="button"
                                    id="togglePassword2" aria-label="Show or hide confirm password">👁</button>
                        </div>
                    </div>

                    <!-- Errors -->
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            {{ form.errors }}
                        </div>
                    {% endif %}

                    <!-- Submit Button -->
                    <button type="submit" 
                            class="btn btn-dark w-100">
                        Register
                    </button>

                    <p class="text-center mt-3">
                        Already have an account? 
                        <a href="{% url 'login' %}">Login</a>
                    </p>

                </form>
            </div>
        </div>
    </div>
</div>
    <script>
// Toggle password 1
document.getElementById('togglePassword1')
    .addEventListener('click', function() {

        const password = document.getElementById(
            'password1');

        if (password.type === 'password') {
            password.type = 'text';
            this.textContent = '🙈';
        } else {
            password.type = 'password';
            this.textContent = '👁';
        }
    });

// Toggle password 2
document.getElementById('togglePassword2')
    .addEventListener('click', function() {

        const password = document.getElementById(
            'password2');

        if (password.type === 'password') {
            password.type = 'text';
            this.textContent = '🙈';
        } else {
            password.type = 'password';
            this.textContent = '👁';
        }
    });
</script>

{% endblock %}
