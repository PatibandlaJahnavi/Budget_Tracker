{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5">
            <div class="card-body">

                <h3 class="text-center mb-4">Login</h3>

                <form method="POST">
                    {% csrf_token %}

                    <!-- Email -->
                    <div class="mb-3">
                        <label>Username</label>
                        {{ form.username }}
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label>Password</label>
                        {{ form.password }}
                    </div>

                    <!-- Errors -->
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Invalid username or password
                        </div>
                    {% endif %}

                    <!-- Submit Button -->
                    <button type="submit" 
                            class="btn btn-dark w-100">
                        Login
                    </button>

                    <p class="text-center mt-3">
                        Don't have an account?
                        <a href="{% url 'register' %}">Register</a>
                    </p>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
